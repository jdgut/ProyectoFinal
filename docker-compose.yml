services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: movilidad-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-movilidad}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-movilidad}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movilidad-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_APP_ENV: dev
      APP_DATABASE_URL: ${APP_DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/movilidad}
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    container_name: movilidad-frontend
    working_dir: /app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:
